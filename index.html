<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladys Ramos | Full Stack Web Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#landing">GR</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#landing">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#tools">Tools</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header id="landing">
        <h1 id="trainee-name">Gladys Ramos</h1> 
        <p>Full Stack Web Developer</p>
    </header>

    <section id="projects">
        <div class="container">
            <h2>My Projects</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <img src="./images/ecommerce-api.png" alt="E-commerce API">
                        <div class="card-body">
                            <h5>E-commerce API</h5>
                            <p>Dynamic E-Commerce Workflow Management.</p>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </section>

    <section id="tools">
        <div class="container">
            <h2>Tools & Technologies</h2>
            <div class="row">
                <div class="col-md-2"><div class="tool-box">HTML5</div></div>
                <div class="col-md-2"><div class="tool-box">CSS3</div></div>
                <div class="col-md-2"><div class="tool-box">Bootstrap5</div></div>
                <div class="col-md-2"><div class="tool-box">Javascript</div></div>
                <div class="col-md-2"><div class="tool-box">Node.js</div></div>
                <div class="col-md-2"><div class="tool-box">Express.js</div></div>
                <div class="col-md-2"><div class="tool-box">MongoDB</div></div>
                <div class="col-md-2"><div class="tool-box">Postman</div></div>
                <div class="col-md-2"><div class="tool-box">Git</div></div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <h2>Contact Me</h2>
            <form id="contact-form">
                <input type="text" id="userName" placeholder="Name" required>
                <input type="email" id="userEmail" placeholder="Email" required>
                <textarea id="userMessage" placeholder="Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>
</html>
